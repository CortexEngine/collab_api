spring:
  application:
    name: collab

  # Declina o uso do docker
  docker:
    compose:
      enabled: false

  # Atualiza os schemas do banco de dados --DEV
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      "[org.hibernate.envers.audit_table_suffix]": _history
      "[org.hibernate.envers.revision_field_name]": rev
      "[org.hibernate.envers.revision_type_field_name]": revtype
      "[org.hibernate.envers.store_data_at_delete]": true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    admin:
      auto-create: true
      fail-fast: ${KAFKA_ADMIN_FAIL_FAST:false}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 5
      properties:
        "[delivery.timeout.ms]": 120000
        "[request.timeout.ms]": 30000
        "[enable.idempotence]": true
    consumer:
      group-id: collab-api
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        "[spring.json.trusted.packages]": "com.example.collab.*"

app:
  kafka:
    topics:
      collaborator-created: collab.collaborator.created
      collaborator-updated: collab.collaborator.updated
      collaborator-deleted: collab.collaborator.deleted
      department-created: collab.department.created
      department-updated: collab.department.updated
      department-deleted: collab.department.deleted
    outbox:
      fixed-delay-ms: 5000
      max-attempts: 5